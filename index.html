<input type="text" id="search" placeholder="Search Victim Name">

<table>
<thead>
<tr>
<th>Date</th>
<th>Victim Name</th>
<th>Gender</th>
<th>Region</th>
<th>Report Type</th>
<th>Location</th>
<th>Case Description</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>

const sheetId = "1Ya_Db4CPACnCBWqnRoCTJ7YnhvolIOWKWjyTVodJXhs";
const sheetName = "Form Responses 1";

fetch(`https://opensheet.elk.sh/${sheetId}/${sheetName}`)
.then(res => res.json())
.then(data => {

document.getElementById("total").innerText = data.length;

function show(rows){

let html = "";

rows.forEach(r => {

html += `
<tr>
<td>${r.Date || ""}</td>
<td>${r["Victim name"] || ""}</td>
<td>${r.Gender || ""}</td>
<td>${r.Region || ""}</td>
<td>${r["Report type"] || ""}</td>
<td>${r.Location || ""}</td>
<td>${r["Case description"] || ""}</td>
</tr>
`;

});

document.getElementById("tbody").innerHTML = html;

}

show(data);

document.getElementById("search").addEventListener("keyup", function(){

let value = this.value.toLowerCase();

let filtered = data.filter(x =>
(x["Victim name"] || "")
.toLowerCase()
.includes(value)
);

show(filtered);

});

})
.catch(error => {
console.log(error);
});

</script>
