<script>
const sheetId = "1Ya_Db4CPACnCBWqnRoCTJ7YnhvolIOWKWjYTVodJXhs";
const sheetName = "Form Responses 1";

fetch(`https://opensheet.elk.sh/${sheetId}/${sheetName}`)
.then(res => res.json())
.then(data => {

document.getElementById("total").innerText =
Array.isArray(data) ? data.length : 0;

function show(rows){

let html = "";

rows.forEach(r => {

html += `
<tr>
<td>${r.Date || ""}</td>
<td>${r["Victim name"] || ""}</td>
<td>${r.Region || ""}</td>
<td>${r["Report type"] || ""}</td>
<td>${r.Location || ""}</td>
</tr>
`;

});

document.getElementById("tbody").innerHTML = html;
}

show(data);

document.getElementById("search")
.addEventListener("keyup", function(){

let value = this.value.toLowerCase();

show(
data.filter(x =>
(x["Victim name"] || "")
.toLowerCase()
.includes(value)
)
);

});

});
</script>
